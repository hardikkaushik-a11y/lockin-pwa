<style>
  :root{
    --bg:#08090A;
    --surface:#0F1117;
    --surface-2:#161922;
    --hairline:rgba(255,255,255,.05);
    --text:#FFFFFF;
    --text-2:#9098A8;
    --text-3:#5A5F6E;
    --recovery:#16D9A8;
    --strain:#F5B546;
    --stress:#FF5963;
    --sleep:#5BA3FF;
    --accent:#16D9A8;
  }
  *{-webkit-tap-highlight-color:transparent;}
  html,body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","SF Pro Text","Segoe UI",sans-serif;letter-spacing:-0.01em;
    overscroll-behavior:none;-webkit-touch-callout:none;-webkit-user-select:none;user-select:none;}
  input,textarea,select{-webkit-user-select:auto;user-select:auto;font-size:16px !important;}
  body{padding-bottom:env(safe-area-inset-bottom);padding-top:env(safe-area-inset-top);}
  .num{font-variant-numeric:tabular-nums;font-feature-settings:"tnum";}
  .display{font-weight:700;letter-spacing:-0.04em;}

  .card{
    background:
      radial-gradient(120% 60% at 0% 0%, rgba(255,255,255,.035), transparent 60%),
      var(--surface);
    border-radius:20px;
    padding:20px;
    position:relative;
    overflow:hidden;
  }
  .card-glow-recovery::before,.card-glow-strain::before,.card-glow-stress::before,.card-glow-sleep::before{
    content:'';position:absolute;top:-40px;right:-40px;width:140px;height:140px;border-radius:50%;filter:blur(40px);opacity:.20;pointer-events:none;
  }
  .card-glow-recovery::before{background:var(--recovery);}
  .card-glow-strain::before{background:var(--strain);}
  .card-glow-stress::before{background:var(--stress);}
  .card-glow-sleep::before{background:var(--sleep);}

  .btn{
    background:linear-gradient(180deg, rgba(255,255,255,.08), rgba(255,255,255,.02));
    border:1px solid rgba(255,255,255,.08);
    color:var(--text);border-radius:14px;padding:14px 18px;font-weight:600;min-height:48px;font-size:15px;
    transition:transform .08s;
  }
  .btn:active{transform:scale(.98);}
  .btn-primary{
    background:linear-gradient(180deg, var(--recovery), #0FB890);
    color:#03110D;border:none;
  }
  .btn-danger{background:linear-gradient(180deg, var(--stress), #D9404C);border:none;color:#fff;}

  .chip{
    padding:8px 14px;border-radius:999px;
    background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.06);
    font-size:13px;font-weight:500;min-height:34px;color:var(--text-2);
  }
  .chip.active{background:var(--text);color:#000;border-color:var(--text);}

  input,select,textarea{
    background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.06);color:var(--text);
    border-radius:12px;padding:12px 14px;font-size:16px;width:100%;
  }
  input:focus,select:focus{outline:none;border-color:var(--recovery);}
  input[type=number]{font-variant-numeric:tabular-nums;}

  .nav{
    position:fixed;bottom:0;left:0;right:0;
    background:rgba(15,17,23,.85);
    backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
    border-top:1px solid var(--hairline);
    display:flex;padding-bottom:env(safe-area-inset-bottom);
  }
  .nav-btn{flex:1;padding:14px 4px 10px;text-align:center;color:var(--text-3);font-size:10px;font-weight:600;letter-spacing:.05em;text-transform:uppercase;}
  .nav-btn.active{color:var(--text);}
  .nav-btn .ico{display:block;font-size:18px;line-height:1;margin-bottom:4px;}

  .wall{position:fixed;inset:0;background:linear-gradient(180deg,#9F1F2A,#5A0F18);z-index:50;display:flex;flex-direction:column;justify-content:center;align-items:center;padding:32px;text-align:center;}
  .scrollx{overflow-x:auto;scrollbar-width:none;}
  .scrollx::-webkit-scrollbar{display:none;}
  dialog{background:var(--surface);color:var(--text);border:1px solid var(--hairline);border-radius:20px;max-width:92vw;width:92vw;padding:0;}
  dialog::backdrop{background:rgba(0,0,0,.7);backdrop-filter:blur(8px);}

  .spark{height:24px;width:100%;}
  .sparkline{stroke-width:1.5;fill:none;}

  /* Readiness ring */
  .ring-wrap{position:relative;width:240px;height:240px;margin:0 auto;}
  .ring-svg{transform:rotate(-90deg);}
  .ring-track{stroke:rgba(255,255,255,.06);}
  .ring-progress{stroke-linecap:round;transition:stroke-dashoffset 1.2s cubic-bezier(.2,.8,.2,1);}
  .ring-center{position:absolute;inset:0;display:flex;flex-direction:column;justify-content:center;align-items:center;}

  .metric-pill{
    background:rgba(255,255,255,.03);border:1px solid var(--hairline);border-radius:16px;padding:12px;
  }

  .session-dot{width:24px;height:8px;border-radius:4px;background:rgba(255,255,255,.08);}
  .session-dot.filled{background:var(--recovery);}

  details>summary{list-style:none;cursor:pointer;}
  details>summary::-webkit-details-marker{display:none;}

  .ex-row{display:grid;grid-template-columns:auto 1fr auto auto auto;gap:8px;align-items:center;}
  .set-num{width:22px;color:var(--text-3);font-size:12px;font-weight:600;}
  .set-input{width:72px !important;text-align:center;padding:10px 6px !important;}
  .set-input-r{width:56px !important;text-align:center;padding:10px 6px !important;}

  .progress-bar{height:4px;background:rgba(255,255,255,.06);border-radius:2px;overflow:hidden;}
  .progress-bar>span{display:block;height:100%;background:var(--recovery);border-radius:2px;transition:width .6s;}

  .hairline{border-top:1px solid var(--hairline);}
</style>
</head>

<script>
/* ============== CONSTANTS ============== */
const EXERCISES = [
  {id:'incline-db-press',name:'Incline Dumbbell Press',group:'push',muscle:'chest',isCompound:true},
  {id:'incline-smith-bench',name:'Incline Smith Machine Press',group:'push',muscle:'chest',isCompound:true},
  {id:'chest-press-machine',name:'Chest Press Machine',group:'push',muscle:'chest',isCompound:false},
  {id:'pec-dec',name:'Pec Dec / Chest Fly',group:'push',muscle:'chest',isCompound:false},
  {id:'cable-fly',name:'Cable Fly',group:'push',muscle:'chest',isCompound:false},
  {id:'pushup',name:'Pushup',group:'push',muscle:'chest',isCompound:false},
  {id:'ohp-barbell',name:'Overhead Barbell Press',group:'push',muscle:'shoulders',isCompound:true},
  {id:'ohp-dumbbell',name:'Dumbbell Overhead Press',group:'push',muscle:'shoulders',isCompound:true},
  {id:'lateral-raise',name:'Lateral Raises',group:'push',muscle:'shoulders',isCompound:false},
  {id:'tricep-pushdown',name:'Tricep Pushdown',group:'push',muscle:'triceps',isCompound:false},
  {id:'cable-katana',name:'Cable Katana Extension',group:'push',muscle:'triceps',isCompound:false},
  {id:'deadlift',name:'Deadlift',group:'pull',muscle:'back',isCompound:true},
  {id:'lat-pulldown',name:'Lat Pulldown',group:'pull',muscle:'back',isCompound:true},
  {id:'machine-row',name:'Machine Row',group:'pull',muscle:'back',isCompound:true},
  {id:'cable-row',name:'Cable Row',group:'pull',muscle:'back',isCompound:true},
  {id:'assisted-pullup',name:'Assisted Pullup',group:'pull',muscle:'back',isCompound:true},
  {id:'barbell-curl',name:'Barbell Curl',group:'pull',muscle:'biceps',isCompound:false},
  {id:'cable-curl',name:'Cable Curl',group:'pull',muscle:'biceps',isCompound:false},
  {id:'hammer-curl',name:'Hammer Curl',group:'pull',muscle:'biceps',isCompound:false},
  {id:'preacher-curl-plates',name:'Preacher Curl (Plates)',group:'pull',muscle:'biceps',isCompound:false},
  {id:'preacher-curl-machine',name:'Preacher Curl (Machine)',group:'pull',muscle:'biceps',isCompound:false},
  {id:'squat',name:'Squat',group:'legs',muscle:'quads',isCompound:true},
  {id:'hack-squat',name:'Hack Squat',group:'legs',muscle:'quads',isCompound:true},
  {id:'leg-press',name:'Leg Press',group:'legs',muscle:'quads',isCompound:true},
  {id:'leg-extension',name:'Leg Extension',group:'legs',muscle:'quads',isCompound:false},
  {id:'leg-curl',name:'Leg Curl',group:'legs',muscle:'hamstrings',isCompound:false},
  {id:'calf-raise',name:'Calf Raises',group:'legs',muscle:'calves',isCompound:false},
];
const EX_BY_ID = Object.fromEntries(EXERCISES.map(e=>[e.id,e]));
const SPLITS = [
  {id:'day1',name:'Chest + Back + Shoulders',exercises:['assisted-pullup','pushup','incline-db-press','lat-pulldown','pec-dec','machine-row','lateral-raise'],supersets:[['assisted-pullup','pushup']]},
  {id:'day2',name:'Arms + Shoulders',exercises:['barbell-curl','tricep-pushdown','cable-curl','cable-katana','ohp-barbell','lateral-raise'],supersets:[['barbell-curl','tricep-pushdown']]},
  {id:'day4',name:'Chest + Biceps',exercises:['incline-smith-bench','chest-press-machine','pec-dec','hammer-curl','barbell-curl','lateral-raise']},
  {id:'day5',name:'Back + Triceps',exercises:['deadlift','lat-pulldown','cable-row','tricep-pushdown','cable-katana','lateral-raise']},
  {id:'day6',name:'Legs + Shoulders',exercises:['squat','leg-press','leg-curl','leg-extension','ohp-dumbbell','lateral-raise','calf-raise']},
  {id:'custom',name:'Custom',exercises:[]},
];
const TARGETS = {calories_min:1800,calories_max:2000,protein_min:140,steps_min:3000,steps_target:5000,weekly_sessions:4};
const REST_DEFAULTS = {compound_sec:120,accessory_sec:90};
const INTENSITIES = ['😴','😐','😤','🔥'];

/* ============== DB ============== */
const db = new Dexie('lockin');
db.version(1).stores({
  workouts:'++id, date, splitId',
  body_metrics:'++id, date',
  checkins:'++id, date',
  health_daily:'date',
  phase:'id',
  settings:'key',
  sync_queue:'++id, action_type, created_at'
});
db.version(2).stores({
  health_workouts:'++id, start, type'
});
const Settings = {
  async get(k,def=null){const r=await db.settings.get(k);return r?r.value:def;},
  async set(k,v){await db.settings.put({key:k,value:v});},
};

/* ============== HELPERS ============== */
const fmtDate = d => {const x=new Date(d);return x.toISOString().slice(0,10);};
const today = ()=>fmtDate(new Date());
const daysBetween = (a,b)=>Math.floor((new Date(b)-new Date(a))/86400000);
const weekStart = d => {const x=new Date(d);const day=(x.getDay()+6)%7;x.setDate(x.getDate()-day);return fmtDate(x);};
const fmtNum = (v,dec=0)=> (v==null||isNaN(v))?'—':(+v).toFixed(dec);
const debounce = (fn,ms)=>{let t;const w=(...a)=>{clearTimeout(t);t=setTimeout(()=>fn(...a),ms);};w.flush=()=>{clearTimeout(t);};return w;};
const avg = arr => {const v=arr.filter(x=>x!=null&&!isNaN(x));return v.length?v.reduce((a,b)=>a+b,0)/v.length:null;};

async function getPhase(){
  let p = await db.phase.get(1);
  if(!p){p={id:1,start_date:today(),target_weeks:12,label:'CUT'};await db.phase.put(p);}
  return p;
}
function weekNumber(phaseStart,date=today()){return Math.floor(daysBetween(phaseStart,date)/7)+1;}

/* ============== ROUTING ============== */
const routes = {};
function route(name){location.hash='#'+name;render();}
function render(){
  const name=(location.hash||'#today').slice(1).split('?')[0];
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.toggle('active',b.dataset.route===name));
  (routes[name]||routes.today)();
  checkWalls();
}
document.querySelectorAll('.nav-btn').forEach(b=>b.addEventListener('click',()=>route(b.dataset.route)));
window.addEventListener('hashchange',render);

const modal = document.getElementById('modal');
function openModal(html){modal.innerHTML=html;modal.showModal();}
function closeModal(){modal.close();modal.innerHTML='';}

/* ============== RING + SPARKLINE ============== */
function ring({score=0, color='#16D9A8', size=240, stroke=14}){
  const r = (size-stroke)/2, c = 2*Math.PI*r;
  const pct = Math.max(0,Math.min(100,score))/100;
  const offset = c*(1-pct);
  return `
    <svg class="ring-svg" width="${size}" height="${size}">
      <defs>
        <linearGradient id="ringg" x1="0" y1="0" x2="1" y2="1">
          <stop offset="0%" stop-color="${color}" stop-opacity="0.6"/>
          <stop offset="100%" stop-color="${color}"/>
        </linearGradient>
      </defs>
      <circle class="ring-track" cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke-width="${stroke}"/>
      <circle class="ring-progress" cx="${size/2}" cy="${size/2}" r="${r}" fill="none"
        stroke="url(#ringg)" stroke-width="${stroke}"
        stroke-dasharray="${c}" stroke-dashoffset="${c}"
        data-target-offset="${offset}"/>
    </svg>`;
}
function animateRings(){
  requestAnimationFrame(()=>{
    document.querySelectorAll('.ring-progress[data-target-offset]').forEach(el=>{
      el.style.strokeDashoffset = el.dataset.targetOffset;
    });
  });
}
function sparkline(values, color='#16D9A8', w=80, h=24){
  const clean = values.filter(v=>v!=null&&!isNaN(v));
  if(clean.length<2) return `<svg class="spark" viewBox="0 0 ${w} ${h}"></svg>`;
  const min = Math.min(...clean), max = Math.max(...clean);
  const range = max-min || 1;
  const step = w/(values.length-1);
  let d = '';
  values.forEach((v,i)=>{
    if(v==null||isNaN(v)) return;
    const x = i*step;
    const y = h - ((v-min)/range)*h*0.85 - h*0.075;
    d += (d?'L':'M')+x.toFixed(1)+' '+y.toFixed(1)+' ';
  });
  return `<svg class="spark" viewBox="0 0 ${w} ${h}" preserveAspectRatio="none"><path class="sparkline" d="${d}" stroke="${color}"/></svg>`;
}

/* ============== KPI DETAIL ============== */
const KPI_DEFS = {
  sleep:    {label:'Sleep',     field:'sleep_total_hr', unit:'h',     color:'var(--sleep)',    decimals:1, goodHigh:true,  desc:'Total time asleep. Sub-7h consistently = HRV drops, recovery debt builds, gym intensity suffers. 7-8h is the green zone.'},
  hrv:      {label:'HRV',       field:'hrv_ms',         unit:'ms',    color:'var(--recovery)', decimals:0, goodHigh:true,  desc:'Heart-rate variability — your nervous system\'s recovery signal. Higher = better recovered, more parasympathetic tone. Compare to your rolling 30-day baseline, not absolute numbers.'},
  rhr:      {label:'Resting HR', field:'resting_hr',    unit:'bpm',   color:'var(--strain)',   decimals:0, goodHigh:false, desc:'Lower = fitter / better recovered. Up 5+ bpm vs baseline often signals incoming illness, alcohol the night before, or poor sleep.'},
  hr_avg:   {label:'HR (24h avg)',field:'hr_avg',       unit:'bpm',   color:'var(--strain)',   decimals:0, goodHigh:false, desc:'Daily average heart rate. Elevated chronically = high stress load. Useful trend-wise.'},
  steps:    {label:'Steps',     field:'steps',          unit:'',      color:'var(--recovery)', decimals:0, goodHigh:true,  desc:'NEAT contribution to your cut. Target 5k+. Below 3k = bigger calorie deficit needed to maintain rate.'},
  cals_in:  {label:'Calories in',field:'calories_in',   unit:'kcal',  color:'var(--strain)',   decimals:0, goodHigh:null,  desc:'From MFP → Apple Health. Cut target: 1800-2000 kcal/day.'},
  cals_out: {label:'Calories out',field:'calories_out', unit:'kcal',  color:'var(--strain)',   decimals:0, goodHigh:true,  desc:'Active energy burned. Workouts + walking. Combined with intake = your real deficit.'},
  protein:  {label:'Protein',   field:'protein_g',      unit:'g',     color:'var(--recovery)', decimals:0, goodHigh:true,  desc:'Target 140g+ daily on the cut. Critical for preserving muscle while in deficit.'},
  weight:   {label:'Weight',    field:'weight_kg',      unit:'kg',    color:'var(--text)',     decimals:1, goodHigh:null,  desc:'Daily fluctuations are mostly water. Look at the 7-day average, not single days.'},
};

async function openKpiDetail(kind){
  const def = KPI_DEFS[kind];
  if(!def) return;
  const isWeight = kind === 'weight';
  const rows = isWeight
    ? (await db.body_metrics.orderBy('date').reverse().limit(90).toArray()).reverse()
    : (await db.health_daily.orderBy('date').reverse().limit(90).toArray()).reverse();
  const values = rows.map(r=>({date:r.date, v:r[def.field]})).filter(p=>p.v!=null && !isNaN(p.v));
  const recent = values.slice(-30);
  const latest = values.at(-1);
  const baseline = recent.length ? recent.reduce((a,b)=>a+b.v,0)/recent.length : null;
  const last7 = values.slice(-7);
  const last7Avg = last7.length ? last7.reduce((a,b)=>a+b.v,0)/last7.length : null;
  const last30Min = recent.length ? Math.min(...recent.map(r=>r.v)) : null;
  const last30Max = recent.length ? Math.max(...recent.map(r=>r.v)) : null;

  // delta vs baseline color
  let delta = null, deltaColor = 'var(--text-2)';
  if(latest && baseline){
    delta = latest.v - baseline;
    if(def.goodHigh === true){
      deltaColor = delta >= 0 ? 'var(--recovery)' : 'var(--stress)';
    } else if(def.goodHigh === false){
      deltaColor = delta <= 0 ? 'var(--recovery)' : 'var(--stress)';
    }
  }

  openModal(`
    <div class="p-5 space-y-4 max-h-[90vh] overflow-y-auto">
      <div class="flex justify-between items-baseline">
        <div>
          <div class="text-[11px] uppercase tracking-widest text-[var(--text-3)]">${def.label}</div>
          <div class="display text-4xl mt-1 num" style="color:${def.color}">${latest ? latest.v.toFixed(def.decimals) : '—'}<span class="text-base text-[var(--text-3)] ml-1">${def.unit}</span></div>
          ${latest ? `<div class="text-xs text-[var(--text-3)] mt-1">${latest.date}</div>` : ''}
        </div>
        <button class="text-[var(--text-2)] text-sm" onclick="closeModal()">Close</button>
      </div>

      <div class="grid grid-cols-3 gap-3">
        <div class="card" style="padding:12px;">
          <div class="text-[10px] uppercase tracking-wider text-[var(--text-3)]">7-day avg</div>
          <div class="display text-lg num mt-1">${last7Avg!=null ? last7Avg.toFixed(def.decimals) : '—'}</div>
        </div>
        <div class="card" style="padding:12px;">
          <div class="text-[10px] uppercase tracking-wider text-[var(--text-3)]">30-day baseline</div>
          <div class="display text-lg num mt-1">${baseline!=null ? baseline.toFixed(def.decimals) : '—'}</div>
        </div>
        <div class="card" style="padding:12px;">
          <div class="text-[10px] uppercase tracking-wider text-[var(--text-3)]">vs baseline</div>
          <div class="display text-lg num mt-1" style="color:${deltaColor}">${delta!=null ? ((delta>=0?'+':'')+delta.toFixed(def.decimals)) : '—'}</div>
        </div>
      </div>

      <div class="card" style="padding:14px;">
        <div class="text-[11px] uppercase tracking-widest text-[var(--text-3)] mb-2">Last 30 days</div>
        <canvas id="kpi-chart" height="160"></canvas>
        <div class="flex justify-between text-[10px] text-[var(--text-3)] mt-1 num">
          <span>min ${last30Min!=null ? last30Min.toFixed(def.decimals) : '—'}</span>
          <span>${recent.length} data points</span>
          <span>max ${last30Max!=null ? last30Max.toFixed(def.decimals) : '—'}</span>
        </div>
      </div>

      <div class="card" style="padding:14px;">
        <div class="text-[11px] uppercase tracking-widest text-[var(--text-3)] mb-2">What this means</div>
        <div class="text-sm text-[var(--text-2)]">${def.desc}</div>
      </div>
    </div>
  `);

  if(recent.length){
    new Chart(document.getElementById('kpi-chart'), {
      type:'line',
      data:{labels:recent.map(r=>r.date), datasets:[
        {data:recent.map(r=>r.v), borderColor:def.color, backgroundColor:def.color+'22', tension:.3, fill:true, pointRadius:0, borderWidth:2},
        ...(baseline!=null ? [{data:recent.map(_=>baseline), borderColor:'rgba(255,255,255,.2)', borderDash:[4,4], pointRadius:0, borderWidth:1, fill:false}] : [])
      ]},
      options:{plugins:{legend:{display:false}}, scales:{x:{ticks:{color:'#5A5F6E', maxTicksLimit:4}, grid:{display:false}}, y:{ticks:{color:'#5A5F6E'}, grid:{color:'rgba(255,255,255,.04)'}}}}
    });
  }
}

/* ============== READINESS SCORE ============== */
async function computeReadiness(){
  const last30 = await db.health_daily.orderBy('date').reverse().limit(30).toArray();
  const last = last30[0];
  const sleepVals = last30.map(d=>d.sleep_total_hr).filter(v=>v!=null&&!isNaN(v)&&v>0);
  const hrvVals = last30.map(d=>d.hrv_ms).filter(v=>v!=null&&!isNaN(v)&&v>0);
  const rhrVals = last30.map(d=>d.resting_hr).filter(v=>v!=null&&!isNaN(v)&&v>0);
  if(!last || sleepVals.length<7 || hrvVals.length<7){
    return {score:null, label:'—', sub:'need more data', color:'#5A5F6E'};
  }
  const sBase = avg(sleepVals), hBase = avg(hrvVals), rBase = avg(rhrVals);
  const s = last.sleep_total_hr ?? sBase;
  const h = last.hrv_ms ?? hBase;
  const r = last.resting_hr ?? rBase;
  // sleep score: 100 at baseline, drops 8pts per hour below, caps
  const sleepScore = Math.max(0,Math.min(100, 100 - (sBase-s)*15));
  // hrv score: 100 at baseline, drops/gains 4pts per ms delta from baseline (clamped)
  const hrvScore = Math.max(0,Math.min(100, 100 + (h-hBase)*3));
  // rhr score: 100 at baseline, drops 5pts per bpm above
  const rhrScore = rBase ? Math.max(0,Math.min(100, 100 - (r-rBase)*5)) : 80;
  const score = Math.round(sleepScore*0.4 + hrvScore*0.4 + rhrScore*0.2);
  let label, sub, color;
  if(score>=70){label='READY'; sub='push hard'; color='#16D9A8';}
  else if(score>=45){label='MODERATE'; sub='5% off top sets'; color='#F5B546';}
  else {label='RECOVER'; sub='rest or light only'; color='#FF5963';}
  return {score, label, sub, color, last};
}

let workoutDraft = null;
const saveDraft = debounce(async ()=>{
  if(!workoutDraft) return;
  if(workoutDraft.id){await db.workouts.update(workoutDraft.id, workoutDraft);}
  else{const id = await db.workouts.add(workoutDraft); workoutDraft.id = id;}
},500);

async function lastSetFor(exId, excludeId=null){
  const all = await db.workouts.orderBy('date').reverse().toArray();
  for(const w of all){
    if(w.id===excludeId) continue;
    const ex = (w.exercises||[]).find(e=>e.exerciseId===exId);
    if(ex){
      const top = (ex.sets||[]).filter(s=>s.weight&&s.reps).sort((a,b)=>(b.weight*b.reps)-(a.weight*a.reps))[0];
      if(top) return top;
    }
  }
  return null;
}

// returns the full sets array from the most recent session that contained this exercise (or null)
async function lastSetsFor(exId, excludeId=null){
  const all = await db.workouts.orderBy('date').reverse().toArray();
  for(const w of all){
    if(w.id===excludeId) continue;
    const ex = (w.exercises||[]).find(e=>e.exerciseId===exId);
    if(ex && (ex.sets||[]).some(s=>s.weight&&s.reps)){
      return ex.sets.map(s=>({weight:s.weight||'', reps:s.reps||''}));
    }
  }
  return null;
}

async function buildSetsForExercise(exId, excludeId=null){
  const last = await lastSetsFor(exId, excludeId);
  if(last && last.length) return last;
  return [{weight:'',reps:''},{weight:'',reps:''},{weight:'',reps:''}];
}

async function renderExList(){
  const wrap = document.getElementById('ex-list');
  if(!wrap) return;
  const blocks = [];
  for(let i=0;i<workoutDraft.exercises.length;i++){
    const e = workoutDraft.exercises[i];
    const meta = EX_BY_ID[e.exerciseId] || {name:e.exerciseId,isCompound:false,muscle:''};
    const last = await lastSetFor(e.exerciseId, workoutDraft.id);
    const nudge = last ? `Try ${last.weight}kg × ${last.reps+1} or ${(+last.weight+2.5)}kg × ${last.reps}` : 'first session — set a baseline';
    const ssTag = e.ssGroup!=null ? `<span style="background:var(--recovery);color:#03110D;padding:2px 6px;border-radius:4px;font-size:9px;font-weight:700;letter-spacing:.05em;margin-right:6px;">SS${String.fromCharCode(65+e.ssGroup)}</span>` : '';
    const ssBorder = e.ssGroup!=null ? `border-left:2px solid var(--recovery);` : '';
    blocks.push(`
      <div class="card ex-card" style="padding:16px;${ssBorder}" data-idx="${i}">
        <div class="flex justify-between items-start mb-3">
          <div class="flex-1">
            <div class="display text-base">${ssTag}${meta.name}</div>
            <div class="text-[11px] uppercase tracking-wider text-[var(--text-3)] mt-0.5">${meta.muscle}</div>
            <div class="text-xs text-[var(--text-2)] mt-1">${last?`Last: ${last.weight}kg × ${last.reps}`:'no history'}</div>
            <div class="text-xs mt-0.5" style="color:var(--recovery)">${nudge}</div>
          </div>
          <button class="text-[var(--text-3)]" data-rm-ex="${i}">✕</button>
        </div>
        <div class="space-y-2">
          ${e.sets.map((s,j)=>`
            <div class="ex-row">
              <span class="set-num">${j+1}</span>
              <div class="flex items-center gap-1">
                <input class="set-input num" type="number" step="0.5" inputmode="decimal" placeholder="kg" value="${s.weight}" data-set-w="${i}-${j}">
                <span class="text-[var(--text-3)] text-sm">×</span>
                <input class="set-input-r num" type="number" inputmode="numeric" placeholder="reps" value="${s.reps}" data-set-r="${i}-${j}">
              </div>
              <span></span>
              <button class="text-[var(--text-3)] text-sm px-1" data-rm-set="${i}-${j}">✕</button>
              <button class="text-[var(--recovery)] text-base px-2" data-rest="${meta.isCompound?REST_DEFAULTS.compound_sec:REST_DEFAULTS.accessory_sec}">▶</button>
            </div>`).join('')}
        </div>
        <button class="text-xs text-[var(--text-2)] mt-3" data-add-set="${i}">+ add set</button>
      </div>`);
  }
  wrap.innerHTML = blocks.join('');

  wrap.querySelectorAll('[data-set-w]').forEach(inp=>inp.oninput = e=>{
    const [i,j] = e.target.dataset.setW.split('-').map(Number);
    workoutDraft.exercises[i].sets[j].weight = e.target.value; saveDraft();
  });
  wrap.querySelectorAll('[data-set-r]').forEach(inp=>inp.oninput = e=>{
    const [i,j] = e.target.dataset.setR.split('-').map(Number);
    workoutDraft.exercises[i].sets[j].reps = e.target.value; saveDraft();
  });
  wrap.querySelectorAll('[data-rm-set]').forEach(b=>b.onclick=()=>{
    const [i,j] = b.dataset.rmSet.split('-').map(Number);
    workoutDraft.exercises[i].sets.splice(j,1); saveDraft(); renderExList();
  });
  wrap.querySelectorAll('[data-add-set]').forEach(b=>b.onclick=()=>{
    workoutDraft.exercises[+b.dataset.addSet].sets.push({weight:'',reps:''}); saveDraft(); renderExList();
  });
  wrap.querySelectorAll('[data-rm-ex]').forEach(b=>b.onclick=()=>{
    workoutDraft.exercises.splice(+b.dataset.rmEx,1); saveDraft(); renderExList();
  });
  wrap.querySelectorAll('[data-rest]').forEach(b=>b.onclick=()=>startRest(+b.dataset.rest));
  // SortableJS: long-press to drag-reorder exercises
  if(window.Sortable && !wrap._sortable){
    wrap._sortable = Sortable.create(wrap, {
      animation: 200,
      delay: 350, delayOnTouchOnly: true, touchStartThreshold: 5,
      ghostClass: 'opacity-30',
      onEnd: ()=>{
        const newOrder = [...wrap.querySelectorAll('.ex-card')].map(el=>+el.dataset.idx);
        workoutDraft.exercises = newOrder.map(i=>workoutDraft.exercises[i]);
        saveDraft(); renderExList();
      },
    });
  }

async function startRest(sec){
  const end = Date.now()+sec*1000;
  const topic = await Settings.get('ntfy_topic');
  if(topic){
    try{await fetch(`https://ntfy.sh/${topic}`,{method:'POST',headers:{'Title':`Rest done ${new Date().toTimeString().slice(0,5)}`,'Priority':'urgent','Delay':sec+'s'},body:'Rest complete — next set'});}
    catch(e){console.warn('ntfy push failed',e);}
  }
  const bar = document.createElement('div');
  bar.style.cssText='position:fixed;top:max(env(safe-area-inset-top),16px);left:50%;transform:translateX(-50%);background:var(--surface);border:1px solid var(--recovery);border-radius:999px;padding:10px 18px;font-size:14px;z-index:40;box-shadow:0 8px 24px rgba(0,0,0,.5);';
  bar.className='num';
  document.body.appendChild(bar);
  const tick = ()=>{
    const left = Math.max(0,Math.round((end-Date.now())/1000));
    bar.textContent = `${Math.floor(left/60)}:${String(left%60).padStart(2,'0')}`;
    if(left<=0){bar.remove(); return;}
    setTimeout(tick,250);
  };
  tick();
}

async function resizeImage(file, maxDim=1080, quality=0.7){
  const img = await createImageBitmap(file);
  const scale = Math.min(maxDim/img.width, maxDim/img.height, 1);
  const w = Math.round(img.width*scale), h = Math.round(img.height*scale);
  if(typeof OffscreenCanvas!=='undefined'){
    const canvas = new OffscreenCanvas(w,h);
    canvas.getContext('2d').drawImage(img,0,0,w,h);
    return await canvas.convertToBlob({type:'image/jpeg',quality});
  } else {
    const canvas = document.createElement('canvas');
    canvas.width=w; canvas.height=h;
    canvas.getContext('2d').drawImage(img,0,0,w,h);
    return await new Promise(res=>canvas.toBlob(res,'image/jpeg',quality));
  }
}

async function showCheckinJudgment(currentId){
  const list = await db.checkins.orderBy('date').toArray();
  const cur = list.find(c=>c.id===currentId);
  const prev = list.filter(c=>c.id!==currentId).at(-1);  // most recent previous
  const phase = await getPhase();
  const isCut = /CUT/i.test(phase.label);
  const isBulk = /BULK/i.test(phase.label);

  if(!prev){
    openModal(`
      <div class="p-5 space-y-3">
        <div class="text-[11px] uppercase tracking-widest text-[var(--text-3)]">Week ${cur.week_number||'—'}</div>
        <h2 class="display text-2xl">Baseline saved.</h2>
        <p class="text-sm text-[var(--text-2)]">This is your first check-in. Next week we'll have something to compare.</p>
        <button class="btn btn-primary w-full" onclick="closeModal();render();">Done</button>
      </div>
    `);
    return;
  }

  const days = Math.max(1, daysBetween(prev.date, cur.date));
  const weeks = days/7;
  const wtΔ = cur.weight_kg - prev.weight_kg;
  const wtΔPct = (wtΔ / prev.weight_kg) * 100;
  const wtRatePct = wtΔPct / weeks;  // %bw per week
  const waistΔ = (cur.waist_cm!=null && prev.waist_cm!=null) ? cur.waist_cm - prev.waist_cm : null;

  // verdict based on phase and rate
  let verdict, vColor;
  const absRate = Math.abs(wtRatePct);
  if(isCut){
    if(wtΔ>0.2) {verdict = 'Weight up. If waist also up, recheck kcal. If waist flat or down, likely water/glycogen — hold the line.'; vColor='var(--strain)';}
    else if(absRate < 0.2) {verdict = 'No meaningful change. Drop kcal by ~100 or add 1500 steps/day. Don\'t crank protein further.'; vColor='var(--strain)';}
    else if(absRate <= 1.0) {verdict = 'On target. Hold current intake.'; vColor='var(--recovery)';}
    else {verdict = 'Cutting too fast. Add 100-150 kcal. You\'ll lose muscle and HRV at this rate.'; vColor='var(--stress)';}
  } else if(isBulk){
    if(wtΔ<-0.2) {verdict = 'Weight down on a bulk. Add 200 kcal, recheck adherence.'; vColor='var(--stress)';}
    else if(absRate < 0.15) {verdict = 'Stalled. Add 150 kcal.'; vColor='var(--strain)';}
    else if(absRate <= 0.5) {verdict = 'On target lean bulk pace.'; vColor='var(--recovery)';}
    else {verdict = 'Gaining too fast — fat gain risk. Trim 150 kcal.'; vColor='var(--strain)';}
  } else {
    verdict = absRate < 0.2 ? 'Holding stable.' : `${wtΔ>0?'Gaining':'Losing'} at ${absRate.toFixed(2)}% bw/wk.`;
    vColor='var(--text-2)';
  }

  const urlPrev = URL.createObjectURL(prev.front_photo);
  const urlCur = URL.createObjectURL(cur.front_photo);

  openModal(`
    <div class="p-5 space-y-4 max-h-[90vh] overflow-y-auto">
      <div>
        <div class="text-[11px] uppercase tracking-widest text-[var(--text-3)]">Week ${cur.week_number||'—'} judgment</div>
        <h2 class="display text-2xl mt-1">${days}d since last</h2>
      </div>

      <div class="grid grid-cols-2 gap-2">
        <div><img src="${urlPrev}" class="w-full rounded-xl"><div class="text-[10px] mt-1 text-center text-[var(--text-3)] uppercase tracking-wider">Wk ${prev.week_number||'—'}</div></div>
        <div><img src="${urlCur}" class="w-full rounded-xl"><div class="text-[10px] mt-1 text-center text-[var(--text-3)] uppercase tracking-wider">Now</div></div>
      </div>

      <div class="grid grid-cols-2 gap-3">
        <div class="card" style="padding:14px;">
          <div class="text-[10px] uppercase tracking-wider text-[var(--text-3)]">Weight Δ</div>
          <div class="display text-2xl num mt-1" style="color:${wtΔ<0?'var(--recovery)':wtΔ>0?'var(--strain)':'var(--text-2)'}">${wtΔ>=0?'+':''}${wtΔ.toFixed(1)}<span class="text-xs text-[var(--text-3)]">kg</span></div>
          <div class="text-xs text-[var(--text-2)] mt-1 num">${wtRatePct>=0?'+':''}${wtRatePct.toFixed(2)}% bw/wk</div>
        </div>
        <div class="card" style="padding:14px;">
          <div class="text-[10px] uppercase tracking-wider text-[var(--text-3)]">Waist Δ</div>
          ${waistΔ!=null
            ? `<div class="display text-2xl num mt-1" style="color:${waistΔ<0?'var(--recovery)':waistΔ>0?'var(--strain)':'var(--text-2)'}">${waistΔ>=0?'+':''}${waistΔ.toFixed(1)}<span class="text-xs text-[var(--text-3)]">cm</span></div>
               <div class="text-xs text-[var(--text-2)] mt-1 num">${prev.waist_cm} → ${cur.waist_cm}</div>`
            : `<div class="display text-2xl num mt-1 text-[var(--text-3)]">—</div>
               <div class="text-xs text-[var(--text-3)] mt-1">log waist to track</div>`}
        </div>
      </div>

      <div class="card" style="padding:16px;border-left:3px solid ${vColor};">
        <div class="text-[10px] uppercase tracking-wider text-[var(--text-3)] mb-1">Verdict</div>
        <div class="text-sm" style="color:${vColor}">${verdict}</div>
      </div>

      <button class="btn btn-primary w-full" onclick="closeModal();render();">Done</button>
    </div>
  `);
}

const CSV_MAP = {
  'Step Count (count)':            ['steps',           v=>Math.round(v)],
  'Weight (kg)':                   ['weight_kg',       v=>v],
  'Body Fat Percentage (%)':       ['body_fat_pct',    v=>v],
  'Sleep Analysis [Total] (hr)':   ['sleep_total_hr',  v=>v],
  'Sleep Analysis [Deep] (hr)':    ['sleep_deep_hr',   v=>v],
  'Sleep Analysis [REM] (hr)':     ['sleep_rem_hr',    v=>v],
  'Heart Rate Variability (ms)':   ['hrv_ms',          v=>v],
  'Resting Heart Rate (count/min)':['resting_hr',      v=>v],
  'Heart Rate [Avg] (count/min)':  ['hr_avg',          v=>v],
  'Active Energy (kJ)':            ['calories_out',    v=>v/4.184],
  'Dietary Energy (kJ)':           ['calories_in',     v=>v/4.184],
  'Protein (g)':                   ['protein_g',       v=>v],
  'Carbohydrates (g)':             ['carbs_g',         v=>v],
  'Total Fat (g)':                 ['fat_g',           v=>v],
  'Apple Exercise Time (min)':     ['exercise_min',    v=>Math.round(v)],
  'VO2 Max (ml/(kg·min))':         ['vo2_max',         v=>v],
  'Waist Circumference (cm)':      ['waist_cm',        v=>v],
};

// HAE JSON metric name -> [db field, unit converter (val,unit)->val]
const JSON_MAP = {
  'step_count':                    ['steps',           (v,u)=>Math.round(v)],
  'weight_body_mass':              ['weight_kg',       (v,u)=>u==='lb'?v*0.45359237:v],
  'body_fat_percentage':           ['body_fat_pct',    (v,u)=>u==='%'?v:v*100],
  'sleep_analysis':                null,  // handled specially below
  'heart_rate_variability':        ['hrv_ms',          (v,u)=>v],
  'resting_heart_rate':            ['resting_hr',      (v,u)=>v],
  'heart_rate':                    ['hr_avg',          (v,u)=>v],
  'active_energy':                 ['calories_out',    (v,u)=>u==='kJ'?v/4.184:v],
  'dietary_energy':                ['calories_in',     (v,u)=>u==='kJ'?v/4.184:v],
  'basal_energy_burned':           ['basal_energy',    (v,u)=>u==='kJ'?v/4.184:v],
  'protein':                       ['protein_g',       (v,u)=>v],
  'carbohydrates':                 ['carbs_g',         (v,u)=>v],
  'total_fat':                     ['fat_g',           (v,u)=>v],
  'apple_exercise_time':           ['exercise_min',    (v,u)=>Math.round(v)],
  'vo2_max':                       ['vo2_max',         (v,u)=>v],
  'waist_circumference':           ['waist_cm',        (v,u)=>u==='in'?v*2.54:v],
};

function slugifyCol(col){
  return col.toLowerCase()
    .replace(/\([^)]*\)/g,'')
    .replace(/\[([^\]]*)\]/g,'_$1')
    .replace(/[^a-z0-9]+/g,'_')
    .replace(/^_+|_+$/g,'')
    .replace(/_+/g,'_');
}

async function importHealth(file){
  if(!file) return;
  const name = file.name.toLowerCase();
  if(name.endsWith('.json')) return importHealthJson(file);
  return importHealthCsv(file);
}

async function importHealthCsv(file){
  const status = document.getElementById('hae-status');
  status.textContent = 'parsing CSV…';
  let count=0, batch=[], bmBatch=[];
  const flush = async ()=>{if(batch.length){await db.health_daily.bulkPut(batch);batch=[];}};
  await new Promise((resolve,reject)=>{
    Papa.parse(file,{
      header:true, skipEmptyLines:true,
      step: async (results, parser)=>{
        const row = results.data;
        const dt = row['Date/Time']; if(!dt) return;
        const date = dt.slice(0,10);
        const rec = {date};
        for(const [col,[field,fn]] of Object.entries(CSV_MAP)){
          const raw = row[col];
          if(raw==null || raw==='' || raw==='NaN') continue;
          const num = parseFloat(raw);
          if(!isNaN(num)) rec[field] = fn(num);
        }
        // catch-all: store every other populated column under slugified name
        for(const [col,raw] of Object.entries(row)){
          if(col==='Date/Time') continue;
          if(CSV_MAP[col]) continue;
          if(raw==null || raw==='' || raw==='NaN') continue;
          const num = parseFloat(raw);
          if(isNaN(num)) continue;
          const f = slugifyCol(col);
          if(f) rec[f] = num;
        }
        if(rec.protein_g === 0 && rec.calories_in > 0) rec.protein_g = null;
        batch.push(rec); count++;
        if(rec.weight_kg!=null || rec.waist_cm!=null){
          const bm = {date, source:'apple_health'};
          if(rec.weight_kg!=null) bm.weight_kg = rec.weight_kg;
          if(rec.waist_cm!=null) bm.waist_cm = rec.waist_cm;
          bmBatch.push(bm);
        }
        if(batch.length>=200){parser.pause(); flush().then(()=>parser.resume());}
        status.textContent = `imported ${count} rows…`;
      },
      complete: async ()=>{await flush(); resolve();},
      error: reject,
    });
  });
  // upsert body_metrics: clear prior apple_health rows + manual rows on import dates (Apple Health wins on collision)
  const prior = await db.body_metrics.filter(b=>b.source==='apple_health').toArray();
  if(prior.length) await db.body_metrics.bulkDelete(prior.map(p=>p.id));
  const importDates = new Set(bmBatch.map(b=>b.date));
  const manualCollisions = (await db.body_metrics.toArray()).filter(b=>b.source!=='apple_health' && importDates.has(b.date));
  if(manualCollisions.length) await db.body_metrics.bulkDelete(manualCollisions.map(c=>c.id));
  if(bmBatch.length) await db.body_metrics.bulkAdd(bmBatch);
  await Settings.set('last_health_sync_at', new Date().toISOString());
  status.innerHTML = `<span style="color:var(--recovery)">✓ Imported ${count} rows · ${bmBatch.length} weight/waist entries · ${manualCollisions.length} stale manual overwrites.</span>`;
  pushState();
}

async function importHealthJson(file){
  const status = document.getElementById('hae-status');
  status.textContent = 'parsing JSON…';
  const text = await file.text();
  let parsed;
  try{parsed = JSON.parse(text);}catch(e){status.innerHTML='<span style="color:var(--stress)">Invalid JSON.</span>';return;}
  const metrics = parsed?.data?.metrics || parsed?.metrics || [];
  const haeWorkouts = parsed?.data?.workouts || parsed?.workouts || [];
  if(!metrics.length && !haeWorkouts.length){status.innerHTML='<span style="color:var(--stress)">No metrics or workouts found. Expected data.metrics[] or data.workouts[].</span>';return;}

  // Aggregate by date
  const byDate = {};
  let metricCount=0;
  for(const m of metrics){
    const mname = m.name;
    const units = m.units || '';
    if(mname==='sleep_analysis'){
      for(const e of (m.data||[])){
        const date = (e.sleepStart || e.date || e.endDate || '').slice(0,10);
        if(!date) continue;
        byDate[date] = byDate[date] || {date};
        const r = byDate[date];
        // HAE sleep_analysis fields: inBed, asleep, sleepStart, sleepEnd, awake, core, deep, rem (all in hours)
        if(e.asleep!=null) r.sleep_total_hr = (r.sleep_total_hr||0) + e.asleep;
        else if(e.inBed!=null && r.sleep_total_hr==null) r.sleep_total_hr = e.inBed;
        if(e.deep!=null) r.sleep_deep_hr = (r.sleep_deep_hr||0) + e.deep;
        if(e.rem!=null) r.sleep_rem_hr = (r.sleep_rem_hr||0) + e.rem;
      }
      metricCount++;
      continue;
    }
    const map = JSON_MAP[mname];
    const field = map ? map[0] : mname;   // use canonical name if mapped, else verbatim metric name
    const fn = map ? map[1] : ((v,u)=>v);
    for(const e of (m.data||[])){
      const date = (e.date || e.startDate || '').slice(0,10);
      if(!date) continue;
      const val = e.qty ?? e.value ?? e.Avg ?? e.avg;
      if(val==null || isNaN(val)) continue;
      byDate[date] = byDate[date] || {date};
      const converted = fn(parseFloat(val), units);
      if(byDate[date][field]==null) byDate[date][field] = converted;
      else byDate[date][field] = (byDate[date][field]+converted)/2;
    }
    metricCount++;
  }
  // MFP quick-add
  for(const d of Object.values(byDate)){
    if(d.protein_g===0 && d.calories_in>0) d.protein_g = null;
  }
  const rows = Object.values(byDate);
  if(rows.length) await db.health_daily.bulkPut(rows);
  // mirror weight/waist into body_metrics with source tag
  const bmBatch = [];
  for(const r of rows){
    if(r.weight_kg!=null || r.waist_cm!=null){
      const bm = {date:r.date, source:'apple_health'};
      if(r.weight_kg!=null) bm.weight_kg = r.weight_kg;
      if(r.waist_cm!=null) bm.waist_cm = r.waist_cm;
      bmBatch.push(bm);
    }
  }
  const prior = await db.body_metrics.filter(b=>b.source==='apple_health').toArray();
  if(prior.length) await db.body_metrics.bulkDelete(prior.map(p=>p.id));
  const importDates = new Set(bmBatch.map(b=>b.date));
  const manualCollisions = (await db.body_metrics.toArray()).filter(b=>b.source!=='apple_health' && importDates.has(b.date));
  if(manualCollisions.length) await db.body_metrics.bulkDelete(manualCollisions.map(c=>c.id));
  if(bmBatch.length) await db.body_metrics.bulkAdd(bmBatch);

  // workouts (HAE JSON has data.workouts[] with per-workout HR samples, energy, distance, etc.)
  let wkCount = 0;
  if(haeWorkouts.length){
    await db.health_workouts.clear();   // idempotent on re-import
    const wkRows = haeWorkouts.map(w=>{
      const r = {
        start: (w.start || w.startDate || '').slice(0,19),
        end:   (w.end || w.endDate || '').slice(0,19),
        type:  w.name || w.workoutActivityType || w.activityType || 'unknown',
        duration_min: w.duration!=null ? +w.duration : null,
        distance_km:  w.distance?.qty ?? w.totalDistance?.qty ?? null,
        energy_kcal:  (w.activeEnergyBurned?.qty ?? w.totalEnergyBurned?.qty ?? w.energy?.qty ?? null),
        avg_hr:       w.avgHeartRate?.qty ?? w.heartRateAvg ?? null,
        max_hr:       w.maxHeartRate?.qty ?? w.heartRateMax ?? null,
        min_hr:       w.minHeartRate?.qty ?? w.heartRateMin ?? null,
        elevation_m:  w.elevationGain?.qty ?? null,
        hr_samples:   (w.heartRateData || w.heartRate || []).slice(0,200),   // cap to keep storage sane
      };
      // catch-all: stash any other top-level numeric fields under raw name
      for(const [k,v] of Object.entries(w)){
        if(['start','end','startDate','endDate','name','workoutActivityType','activityType','duration','distance','totalDistance','activeEnergyBurned','totalEnergyBurned','energy','avgHeartRate','maxHeartRate','minHeartRate','heartRateAvg','heartRateMax','heartRateMin','elevationGain','heartRateData','heartRate','route'].includes(k)) continue;
        if(typeof v === 'number') r[k] = v;
        else if(v?.qty != null && typeof v.qty === 'number') r[k] = v.qty;
      }
      return r;
    });
    await db.health_workouts.bulkAdd(wkRows);
    wkCount = wkRows.length;
  }

  await Settings.set('last_health_sync_at', new Date().toISOString());
  status.innerHTML = `<span style="color:var(--recovery)">✓ Imported ${rows.length} days · ${metricCount} metrics · ${bmBatch.length} weight/waist · ${wkCount} workouts.</span>`;
  pushState();
}

  const wkBuckets = {};
  const w4 = await db.workouts.where('date').aboveOrEqual(cutoff).toArray();
  for(const w of w4){const ws = weekStart(w.date);(wkBuckets[ws]=wkBuckets[ws]||new Set()).add(w.date);}
  const wkArr = Object.values(wkBuckets);
  const sleepIntent = await Settings.get('sleep_intent_set_at',null);
  const wtRows = await db.body_metrics.where('date').aboveOrEqual(cutoff).sortBy('date');
  const wtAvg = wtRows.length ? wtRows.reduce((a,b)=>a+b.weight_kg,0)/wtRows.length : null;
  const wtDelta4 = (wtRows.length>=2) ? (wtRows.at(-1).weight_kg - wtRows[0].weight_kg) : null;
  return {
    last_checkin: ck?.date || null,
    current_week_start: wkStart,
    this_week_sessions: wkDates.length,
    this_week_session_dates: wkDates,
    last_workout: lastW?.date || null,

    phase_target_weeks: phase.target_weeks,
    sleep_intent_set_at: sleepIntent,
    rolling_4wk:{
      sleep_total_avg: avg(h4.map(d=>d.sleep_total_hr)),
      hrv_avg: avg(h4.map(d=>d.hrv_ms)),
      resting_hr_avg: avg(h4.map(d=>d.resting_hr)),
      weight_avg: wtAvg,
      weight_delta_4wk: wtDelta4,
      protein_avg: avg(h4.map(d=>d.protein_g)),
      calories_in_avg: avg(h4.map(d=>d.calories_in)),
      calories_out_avg: avg(h4.map(d=>d.calories_out)),
      steps_avg: avg(h4.map(d=>d.steps)),
      sessions_total: w4.length,
      sessions_weeks_at_target: wkArr.filter(s=>s.size>=4).length,
      sessions_weeks_total: wkArr.length,
    },
    updated_at: new Date().toISOString(),
  };
}

async function ghPutFile(tok, repo, path, contentB64, message){
  const url = `https://api.github.com/repos/${repo}/contents/${path}`;
  const getR = await fetch(url, {headers:{Authorization:'token '+tok, Accept:'application/vnd.github+json'}});
  let sha;
  if(getR.ok){sha = (await getR.json()).sha;}
  const putR = await fetch(url, {method:'PUT', headers:{Authorization:'token '+tok, 'Content-Type':'application/json'},
    body:JSON.stringify({message, content:contentB64, sha})});
  if(!putR.ok && putR.status===409){
    const r2 = await fetch(url, {headers:{Authorization:'token '+tok}});
    sha = (await r2.json()).sha;
    return await fetch(url, {method:'PUT', headers:{Authorization:'token '+tok, 'Content-Type':'application/json'},
      body:JSON.stringify({message:message+' (retry)', content:contentB64, sha})});
  }
  return putR;
}

async function blobToB64(blob){
  return new Promise((res,rej)=>{const fr=new FileReader(); fr.onload=()=>res(fr.result.split(',')[1]); fr.onerror=rej; fr.readAsDataURL(blob);});
}

async function buildWeeklyDetail(){
  // last 14 days of health_daily + last 4 workouts + body_metrics in range
  const cutoff = fmtDate(new Date(Date.now()-14*86400000));
  const days = (await db.health_daily.where('date').aboveOrEqual(cutoff).toArray()).sort((a,b)=>a.date.localeCompare(b.date));
  const wks = (await db.workouts.orderBy('date').reverse().limit(4).toArray()).map(w=>({
    date:w.date, splitId:w.splitId, intensity:w.intensity,
    exercises:(w.exercises||[]).map(e=>{
      const m = EX_BY_ID[e.exerciseId]||{};
      return {name:m.name||e.exerciseId, muscle:m.muscle, sets:(e.sets||[]).filter(s=>s.weight&&s.reps)};
    }),
  }));
  const bm = await db.body_metrics.where('date').aboveOrEqual(cutoff).sortBy('date');
  const checkins = (await db.checkins.orderBy('date').reverse().limit(2).toArray()).map(c=>({
    date:c.date, week_number:c.week_number, weight_kg:c.weight_kg, waist_cm:c.waist_cm||null,
  }));
  // HAE per-workout data (HR samples etc.) within the 14-day window
  const haeWk = (await db.health_workouts.toArray())
    .filter(w => w.start && w.start.slice(0,10) >= cutoff)
    .sort((a,b)=>a.start.localeCompare(b.start));
  return {
    generated_at: new Date().toISOString(),
    daily: days,
    workouts: wks,                // Lock-In logged workouts (sets/reps/weight)
    hae_workouts: haeWk,          // Apple Health workouts (per-session HR, energy, distance)
    body_metrics: bm,
    checkins,
  };
}

async function pushCheckinBundle(currentCheckinId){
  const tok = await Settings.get('github_token');
  const repo = await Settings.get('github_repo');
  if(!tok || !repo){console.warn('no repo configured, skipping bundle push');return;}

  // 1. push weekly-detail.json
  const detail = await buildWeeklyDetail();
  const detailB64 = btoa(unescape(encodeURIComponent(JSON.stringify(detail,null,2))));
  await ghPutFile(tok, repo, 'weekly-detail.json', detailB64, 'weekly detail update');

  // 2. push photos for the latest 2 checkins (prune older from repo path is best-effort skipped)
  const last2 = await db.checkins.orderBy('date').reverse().limit(2).toArray();
  for(const c of last2.reverse()){  // oldest first so file ordering matches chronology
    const wk = c.week_number || 'x';
    for(const k of ['front','side','back']){
      if(!c[k+'_photo']) continue;
      const b64 = await blobToB64(c[k+'_photo']);
      await ghPutFile(tok, repo, `photos/wk${wk}_${k}.jpg`, b64, `photo wk${wk} ${k}`);
    }
  }

  // 3. fire repository_dispatch to trigger weekly-insight workflow immediately
  await fetch(`https://api.github.com/repos/${repo}/dispatches`, {
    method:'POST',
    headers:{Authorization:'token '+tok, Accept:'application/vnd.github+json', 'Content-Type':'application/json'},
    body:JSON.stringify({event_type:'checkin-done'}),
  });
}

async function autoSyncHealth(){
  const tok = await Settings.get('github_token');
  const repo = await Settings.get('github_repo');
  if(!tok || !repo) return {synced:false, reason:'no repo'};
  try{
    // check sync metadata first to avoid re-importing same payload
    const metaR = await fetch(`https://api.github.com/repos/${repo}/contents/hae-sync.json`,
      {headers:{Authorization:'token '+tok, Accept:'application/vnd.github.raw'}});
    if(!metaR.ok) return {synced:false, reason:'no hae-sync.json yet'};
    const meta = JSON.parse(await metaR.text());
    const lastLocal = await Settings.get('last_hae_pushed_at', '');
    if(meta.last_hae_push_at === lastLocal) return {synced:false, reason:'already current'};

    // fetch the payload
    const r = await fetch(`https://api.github.com/repos/${repo}/contents/health-latest.json`,
      {headers:{Authorization:'token '+tok, Accept:'application/vnd.github.raw'}});
    if(!r.ok) return {synced:false, reason:'health-latest.json fetch failed'};
    const text = await r.text();
    const file = new Blob([text], {type:'application/json'});
    file.name = 'health-latest.json';   // some browsers expect a name
    // synthesize a File-like for importHealthJson which expects file.text()
    const fakeFile = {name:'health-latest.json', text: ()=>Promise.resolve(text)};
    // status element may not exist if not on Settings screen — temporarily inject one
    let status = document.getElementById('hae-status');
    let tempStatus = false;
    if(!status){status = document.createElement('div'); status.id='hae-status'; status.style.display='none'; document.body.appendChild(status); tempStatus=true;}
    await importHealthJson(fakeFile);
    if(tempStatus) status.remove();
    await Settings.set('last_hae_pushed_at', meta.last_hae_push_at);
    return {synced:true, pushedAt:meta.last_hae_push_at};
  }catch(e){
    console.warn('autoSyncHealth failed', e);
    return {synced:false, reason:e.message};
  }
}

const pushState = debounce(async (force=false)=>{
  const tok = await Settings.get('github_token');
  const repo = await Settings.get('github_repo');
  if(!tok || !repo){if(force) alert('Set GitHub token + repo first.');return;}
  const payload = await buildStatePayload();
  const content = btoa(unescape(encodeURIComponent(JSON.stringify(payload,null,2))));
  const url = `https://api.github.com/repos/${repo}/contents/state.json`;
  try{
    const getR = await fetch(url,{headers:{Authorization:'token '+tok,Accept:'application/vnd.github+json'}});
    let sha; if(getR.ok){sha=(await getR.json()).sha;}
    const putR = await fetch(url,{method:'PUT',headers:{Authorization:'token '+tok,'Content-Type':'application/json'},body:JSON.stringify({message:'state update',content,sha})});
    if(!putR.ok){
      if(putR.status===409){
        const getR2 = await fetch(url,{headers:{Authorization:'token '+tok}});
        sha = (await getR2.json()).sha;
        await fetch(url,{method:'PUT',headers:{Authorization:'token '+tok,'Content-Type':'application/json'},body:JSON.stringify({message:'state update (retry)',content,sha})});
      } else {throw new Error('HTTP '+putR.status);}
    }
    await Settings.set('last_state_push_at', new Date().toISOString());
  }catch(e){
    console.warn('state push failed',e);
    await db.sync_queue.add({action_type:'state_push',created_at:Date.now()});
  }
},5000);

/* ============== WEB PUSH ============== */
const VAPID_PUBLIC = 'BLU0vaBI6DVkIpQVB2L3RqlJSbcHiHyeXRRhAbcisq7vUM7BGU3ixf1OsrTeq9uiTntPV2EIW2wSdiN08_XzTqk';

function urlB64ToUint8Array(s){
  const pad = '='.repeat((4 - s.length % 4) % 4);
  const b64 = (s + pad).replace(/-/g,'+').replace(/_/g,'/');
  const raw = atob(b64);
  const out = new Uint8Array(raw.length);
  for(let i=0;i<raw.length;i++) out[i] = raw.charCodeAt(i);
  return out;
}

async function setupWebPush(){
  if(typeof Notification === 'undefined'){
    throw new Error('Notification API not available — open Lock-In from the home-screen icon (not Safari tab), and ensure iOS is 16.4+');
  }
  if(!('serviceWorker' in navigator) || !('PushManager' in window)){
    throw new Error('Service Worker / Push API not supported in this browser');
  }
  const reg = await navigator.serviceWorker.register('sw.js');
  await navigator.serviceWorker.ready;
  let sub = await reg.pushManager.getSubscription();
  if(!sub){
    if(Notification.permission === 'default'){
      const perm = await Notification.requestPermission();
      if(perm !== 'granted') throw new Error('Permission '+perm);
    } else if(Notification.permission !== 'granted'){
      throw new Error('Permission previously denied — fix in iPhone Settings → Notifications → Lock-In');
    }
    sub = await reg.pushManager.subscribe({
      userVisibleOnly: true,
      applicationServerKey: urlB64ToUint8Array(VAPID_PUBLIC),
    });
  }
  // push subscription to private repo so workflow can use it
  const tok = await Settings.get('github_token');
  const repo = await Settings.get('github_repo');
  const lastSubStr = await Settings.get('last_push_sub', '');
  const subStr = JSON.stringify(sub);
  if(tok && repo && subStr !== lastSubStr){
    try{
      const b64 = btoa(unescape(encodeURIComponent(subStr)));
      await ghPutFile(tok, repo, 'push_subscription.json', b64, 'update push subscription');
      await Settings.set('last_push_sub', subStr);
    }catch(e){console.warn('failed to push subscription', e);}
  }
  return sub;
}

/* ============== SEED LOADER ============== */
async function loadSeed(){
  const r = await fetch('seed.json?v='+Date.now());
  if(!r.ok) throw new Error('seed.json fetch '+r.status);
  const seed = await r.json();
  if(seed.daily?.length) await db.health_daily.bulkPut(seed.daily);
  if(seed.body_metrics?.length){
    const prior = (await db.body_metrics.toArray()).filter(b=>b.source==='apple_health');
    if(prior.length) await db.body_metrics.bulkDelete(prior.map(p=>p.id));
    await db.body_metrics.bulkAdd(seed.body_metrics);
  }
  await Settings.set('seed_loaded', true);
  await Settings.set('last_health_sync_at', 'seeded ' + (seed.generated_at||''));
  return {daily:seed.daily?.length||0, body:seed.body_metrics?.length||0};
}

/* ============== BLOCKING WALLS ============== */
async function checkWalls(){
  document.querySelectorAll('.wall').forEach(w=>w.remove());
  if(sessionStorage.getItem('wall-dismissed')) return;
  const now = new Date();
  const ck = (await db.checkins.orderBy('date').reverse().limit(1).toArray())[0];
  const daysCk = ck ? daysBetween(ck.date,today()) : 999;
  if(now.getDay()===0 && now.getHours()>=10 && daysCk>6){
    showWall('DO THE CHECK-IN','Start check-in now',openCheckinModal); return;
  }
  if(now.getHours()>=9){
    const wkWorkouts = await db.workouts.where('date').aboveOrEqual(weekStart(today())).toArray();
    const uniqueDays = new Set(wkWorkouts.map(w=>w.date)).size;
    const todayHasWorkout = wkWorkouts.some(w=>w.date===today() && (w.exercises||[]).some(e=>(e.sets||[]).some(s=>s.weight&&s.reps)));
    if(uniqueDays<4 && !todayHasWorkout){
      showWall('Hardik, go to the gym.','You need to be the Best Version of yourself.',()=>route('log'),'Log workout now');
    }
  }
}
function showWall(title,sub,fn,btnLabel='Start now'){
  const el = document.createElement('div');
  el.className='wall';
  el.innerHTML = `
    <div class="display text-4xl mb-2">${title}</div>
    <div class="text-white/80 mb-8 max-w-xs">${sub||''}</div>
    <button class="bg-white text-black font-bold px-8 py-4 rounded-2xl mb-4">${btnLabel}</button>
    <button class="text-white/60 text-sm underline">later</button>
  `;
  el.children[2].onclick = ()=>{sessionStorage.setItem('wall-dismissed','1');el.remove();fn();};
  el.children[3].onclick = ()=>{sessionStorage.setItem('wall-dismissed','1');el.remove();};
  document.body.appendChild(el);
}

/* ============== BOOT ============== */
(async ()=>{
  if(navigator.storage?.persist){
    const has = await navigator.storage.persisted();
    if(!has) navigator.storage.persist().catch(()=>{});
  }
  const q = await db.sync_queue.toArray();
  if(q.length){pushState(true);await db.sync_queue.clear();}
  await getPhase();
  // auto-seed if data is clearly incomplete (< 100 days)
  const dayCount = await db.health_daily.count();
  if(dayCount < 100) await loadSeed().catch(e=>console.warn('auto-seed failed', e));
  render();
  // background: web push + HAE sync + insight refresh
  (async()=>{
    setupWebPush().catch(e=>console.warn('web push setup failed', e));
    const r = await autoSyncHealth();
    if(r.synced) render();
    const t = await fetchLatestInsight();
    if(t) render();
  })();
})();
